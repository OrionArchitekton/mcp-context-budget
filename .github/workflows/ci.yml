name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e '.[dev]'
      - name: Ruff
        run: |
          ruff format --check .
          ruff check .
      - name: Tests
        run: pytest -q
      - name: Demo
        run: mcp-context-budget demo --task "triage a GitHub issue" --max-tools 8 --max-schema-tokens 6000 --max-response-tokens 4000
